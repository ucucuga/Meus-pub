version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: meus-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-meus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U meus']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - meus

  redis:
    image: redis:7-alpine
    container_name: meus-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - meus

networks:
  meus:
    driver: bridge

volumes:
  pgdata:
  redisdata:
